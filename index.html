<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Local Storage iframe</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .fullscreen-iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <iframe 
        id="myIframe"
        src="https://publicqgrm.github.io/ineed.app.android.com/" 
        name="VSCOIN" 
        class="fullscreen-iframe"
        loading="lazy" 
        allowfullscreen 
        sandbox="allow-scripts allow-same-origin allow-forms">
    </iframe>

    <script>
        // ১. লোকাল স্টোরেজ ব্রাউজারে অ্যাভেলেবল এবং সচল আছে কিনা তা চেক করার ফাংশন
        function isLocalStorageAvailable() {
            try {
                const testKey = "__storage_test__";
                localStorage.setItem(testKey, testKey);
                localStorage.removeItem(testKey);
                return true;
            } catch (e) {
                return false;
            }
        }

        // ২. ক্রাশ-ফ্রি ডাটা সেভ করার ফাংশন (Safe Save)
        function safeSetItem(key, value) {
            if (isLocalStorageAvailable()) {
                try {
                    localStorage.setItem(key, value);
                } catch (e) {
                    if (e.name === 'QuotaExceededError') {
                        console.error("লোকাল স্টোরেজ ফুল হয়ে গেছে!");
                    } else {
                        console.error("লোকাল স্টোরেজে ডাটা রাখতে সমস্যা হচ্ছে:", e);
                    }
                }
            } else {
                console.warn("এই ব্রাউজারে লোকাল স্টোরেজ ব্লকড বা সাপোর্টেড না।");
            }
        }

        // ৩. ক্রাশ-ফ্রি ডাটা রিড করার ফাংশন (Safe Get)
        function safeGetItem(key) {
            if (isLocalStorageAvailable()) {
                try {
                    return localStorage.getItem(key);
                } catch (e) {
                    console.error("লোকাল স্টোরেজ থেকে ডাটা পড়তে সমস্যা হচ্ছে:", e);
                    return null;
                }
            }
            return null;
        }

        // উদাহরণস্বরূপ ব্যবহার (কোড ক্রাশ করবে না):
        safeSetItem("user_session", "vscoin_active_user");
        console.log("Saved Data:", safeGetItem("user_session"));
    </script>

</body>
</html>
